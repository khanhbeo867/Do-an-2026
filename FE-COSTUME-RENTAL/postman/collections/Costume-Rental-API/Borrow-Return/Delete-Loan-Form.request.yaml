$kind: http-request
name: Delete Loan Form
description: |-
  Xóa phiếu mượn/thuê theo `id`.

  - `permanantly=false` (mặc định): xóa mềm (`is_active=false`)
  - `permanantly=true`: xóa cứng cả phiếu và các loan item liên quan.
method: DELETE
url: '{{baseUrl}}/loan-forms/:id'
order: 5300
pathVariables:
  id: '1'
params:
  - key: permanantly
    value: 'false'
    disabled: true
